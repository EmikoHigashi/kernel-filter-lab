<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Interactive Kernel Filter Lab (Web)</title>
    <style>
        body { font-family: sans-serif; display: flex; padding: 20px; gap: 20px; background: #f0f0f0; }
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #canvas-container { position: relative; cursor: crosshair; }
        canvas { border: 1px solid #ccc; max-width: 400px; height: auto; }
        .kernel-grid { display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; margin: 10px 0; }
        .kernel-grid input { width: 60px; text-align: center; }
        .val-grid { display: grid; grid-template-columns: repeat(3, 40px); gap: 2px; background: #ddd; padding: 2px; }
        .val-cell { background: white; text-align: center; font-size: 12px; height: 20px; line-height: 20px; border: 1px solid #ccc; }
        h3 { margin-top: 0; font-size: 16px; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h3>画像操作エリア</h3>
    <input type="file" id="upload" accept="image/*"><br><br>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <p><small>クリックまたは矢印キーでピクセル選択</small></p>
</div>

<div class="panel" style="width: 250px;">
    <h3>Kernel Sum: <span id="sum-label">1.00</span></h3>
    <div class="kernel-grid" id="kernel-inputs">
        </div>
    
    <select id="preset-select">
        <option value="Identity">Identity</option>
        <option value="Box Blur">Box Blur</option>
        <option value="Sharpen">Sharpen</option>
        <option value="Edge">Edge</option>
        <option value="Emboss">Emboss</option>
    </select>

    <hr>
    <p id="pos-label">Position: (0, 0)</p>
    
    <h4>Original Pixels (3x3)</h4>
    <div class="val-grid" id="src-vals"></div>

    <h4>Filtered Pixels (3x3)</h4>
    <div class="val-grid" id="dst-vals"></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let originalImageData = null;
    let targetPos = { x: 0, y: 0 };

    const presets = {
        "Identity": [[0,0,0],[0,1,0],[0,0,0]],
        "Box Blur": [[1/9,1/9,1/9],[1/9,1/9,1/9],[1/9,1/9,1/9]],
        "Sharpen": [[0,-1,0],[-1,5,-1],[0,-1,0]],
        "Edge": [[-1,-1,-1],[-1,8,-1],[-1,-1,-1]],
        "Emboss": [[-2,-1,0],[-1,1,1],[0,1,2]]
    };

    // 初期化: カーネル入力欄の生成
    const kernelInputs = document.getElementById('kernel-inputs');
    for(let i=0; i<9; i++) {
        const input = document.createElement('input');
        input.type = 'number';
        input.step = '0.1';
        input.value = (i === 4) ? 1 : 0;
        input.addEventListener('input', updateAll);
        kernelInputs.appendChild(input);
    }

    // 数値グリッドの生成
    function createValGrid(id) {
        const grid = document.getElementById(id);
        for(let i=0; i<9; i++) {
            const cell = document.createElement('div');
            cell.className = 'val-cell';
            cell.textContent = '0';
            grid.appendChild(cell);
        }
    }
    createValGrid('src-vals');
    createValGrid('dst-vals');

    // 画像読み込み
    document.getElementById('upload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                targetPos = { x: Math.floor(canvas.width/2), y: Math.floor(canvas.height/2) };
                updateAll();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function getKernel() {
        const inputs = kernelInputs.querySelectorAll('input');
        const k = [];
        for(let i=0; i<3; i++) {
            k.push([parseFloat(inputs[i*3].value), parseFloat(inputs[i*3+1].value), parseFloat(inputs[i*3+2].value)]);
        }
        return k;
    }

    function updateAll() {
        if (!originalImageData) return;
        const kernel = getKernel();
        const sum = kernel.flat().reduce((a, b) => a + b, 0);
        document.getElementById('sum-label').textContent = sum.toFixed(2);

        // フィルタ処理
        const filteredData = applyKernel(originalImageData, kernel);
        ctx.putImageData(filteredData, 0, 0);

        // 赤枠を描画
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 2;
        ctx.strokeRect(targetPos.x - 2, targetPos.y - 2, 5, 5);

        updateMatrixDisplay(originalImageData, filteredData);
    }

    function applyKernel(imgData, kernel) {
        const width = imgData.width;
        const height = imgData.height;
        const src = imgData.data;
        const out = new Uint8ClampedArray(src.length);

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                let r = 0; // グレースケール想定なので代表でRを計算（元コードがL変換のため）
                for (let ky = -1; ky <= 1; ky++) {
                    for (let kx = -1; kx <= 1; kx++) {
                        const sy = Math.min(height - 1, Math.max(0, y + ky));
                        const sx = Math.min(width - 1, Math.max(0, x + kx));
                        const val = src[(sy * width + sx) * 4];
                        r += val * kernel[ky + 1][kx + 1];
                    }
                }
                const idx = (y * width + x) * 4;
                out[idx] = out[idx+1] = out[idx+2] = r;
                out[idx+3] = 255;
            }
        }
        return new ImageData(out, width, height);
    }

    function updateMatrixDisplay(srcData, dstData) {
        document.getElementById('pos-label').textContent = `Position: (X=${targetPos.x}, Y=${targetPos.y})`;
        const srcCells = document.getElementById('src-vals').children;
        const dstCells = document.getElementById('dst-vals').children;

        for (let ky = -1; ky <= 1; ky++) {
            for (let kx = -1; kx <= 1; kx++) {
                const sy = Math.min(srcData.height - 1, Math.max(0, targetPos.y + ky));
                const sx = Math.min(srcData.width - 1, Math.max(0, targetPos.x + kx));
                const idx = (sy * srcData.width + sx) * 4;
                const cellIdx = (ky+1)*3 + (kx+1);
                srcCells[cellIdx].textContent = Math.round(srcData.data[idx]);
                dstCells[cellIdx].textContent = Math.round(dstData.data[idx]);
            }
        }
    }

    // イベント
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        targetPos.x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        targetPos.y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
        updateAll();
    });

    window.addEventListener('keydown', (e) => {
        if(!originalImageData) return;
        if(e.key === "ArrowUp") targetPos.y = Math.max(0, targetPos.y - 1);
        if(e.key === "ArrowDown") targetPos.y = Math.min(canvas.height-1, targetPos.y + 1);
        if(e.key === "ArrowLeft") targetPos.x = Math.max(0, targetPos.x - 1);
        if(e.key === "ArrowRight") targetPos.x = Math.min(canvas.width-1, targetPos.x + 1);
        updateAll();
    });

    document.getElementById('preset-select').addEventListener('change', (e) => {
        const k = presets[e.target.value];
        const inputs = kernelInputs.querySelectorAll('input');
        inputs.forEach((input, i) => {
            input.value = k[Math.floor(i/3)][i%3].toFixed(2);
        });
        updateAll();
    });
</script>

</body>
</html>
